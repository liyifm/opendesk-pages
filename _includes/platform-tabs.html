<!-- Platform Tabs Component -->
<div class="platform-tabs">
  <div class="tab-buttons">
    <button class="tab-btn active" data-tab="windows"><i class="fab fa-windows"></i>Windows</button>
    <button class="tab-btn" data-tab="macos"><i class="fab fa-apple"></i>macOS</button>
    <button class="tab-btn" data-tab="linux"><i class="fab fa-linux"></i>Linux</button>
  </div>
  <div class="tab-content active" data-content="windows">
    {{ include.windows | markdownify }}
  </div>
  <div class="tab-content" data-content="macos">
    {{ include.macos | markdownify }}
  </div>
  <div class="tab-content" data-content="linux">
    {{ include.linux | markdownify }}
  </div>
</div>

<script>
(function() {
  var containers = document.querySelectorAll('.platform-tabs');
  containers.forEach(function(container) {
    var buttons = container.querySelectorAll('.tab-btn');
    var contents = container.querySelectorAll('.tab-content');

    buttons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var tabId = this.getAttribute('data-tab');

        buttons.forEach(function(b) { b.classList.remove('active'); });
        contents.forEach(function(c) { c.classList.remove('active'); });

        this.classList.add('active');
        container.querySelector('[data-content="' + tabId + '"]').classList.add('active');
      });
    });
  });
})();
</script>
